    <section class="home">
        <div class="feedback-section">
            <div class="tech-label">Get in Touch</div>
            <h2 style="color: rgb(35, 170, 177);">Send Us Your Feedback</h2>
            <form id="feedbackForm" class="glass-form" action="https://formspree.io/f/mwvnoznl" method="POST">

                <div class="form-row">
                    <input type="text" id="name" name="name" placeholder="Your Name" required>

                    <input type="email" id="email" name="email" placeholder="Your Email" required>
                </div>

                <textarea id="message" name="message" placeholder="Your Feedback" rows="5" required></textarea>

                <button type="submit" class="submit-btn">
                    Send Feedback
                </button>

            </form>
        </div>
        <div id="feedbackModal" class="modal-overlay">
    <div class="modal-content glass">
        <div id="modalIcon" class="modal-icon"></div>
        <h2 id="modalTitle" style="font-size: 1.5rem;">Success!</h2>
        <p id="modalMessage">Your vision has been drafted. We will contact you soon.</p>
        <button onclick="closeModal()" class="submit-btn">Continue</button>
    </div>
</div>
